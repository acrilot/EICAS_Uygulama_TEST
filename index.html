    <div class="control-panel engine-panel">
        <div class="control-group">
            <h3>Motor Kontrolleri</h3>
            <div class="engine-controls">

                <div class="engine-buttons">
                    <button onclick="toggleReverser('L')">REV</button>
                    <button onclick="toggleFailure('eng', 'L')">ENG FAIL</button>
                    <button onclick="toggleFailure('svo', 'L')">SVO</button>
                    <button onclick="toggleFailure('ofb', 'L')">OFB</button>
                    <button onclick="toggleFailure('lop', 'L')">LOP</button>
                    <button onclick="toggleFailure('thrust', 'L')">THRUST</button>
                    <button onclick="toggleFailure('lowFuel', 'L')">LOW FUEL</button>
                </div>

                <div class="slider-group">
                    <div class="slider-container">
                        <input type="range" class="slider-vertical" id="throttle-L" orient="vertical" min="0" max="105"
                            step="0.1" value="0">
                        <input type="text" class="input-value input-vertical" id="throttle-val-L" value="0.0">
                    </div>
                    <div class="slider-container">
                        <input type="range" class="slider-vertical" id="throttle-R" orient="vertical" min="0" max="105"
                            step="0.1" value="0">
                        <input type="text" class="input-value input-vertical" id="throttle-val-R" value="0.0">
                    </div>
                </div>

                <div class="engine-buttons">
                    <button onclick="toggleReverser('R')">REV</button>
                    <button onclick="toggleFailure('eng', 'R')">ENG FAIL</button>
                    <button onclick="toggleFailure('svo', 'R')">SVO</button>
                    <button onclick="toggleFailure('ofb', 'R')">OFB</button>
                    <button onclick="toggleFailure('lop', 'R')">LOP</button>
                    <button onclick="toggleFailure('thrust', 'R')">THRUST</button>
                    <button onclick="toggleFailure('lowFuel', 'R')">LOW FUEL</button>
                </div>

            </div>
        </div>

        <div class="control-group borderless">
            <h3>Refereans & Sıcaklık</h3>
            <div class="vertical-layout">
                <div class="horizontal-setting">
                    <label class="setting-label">N1 Ref:</label>
                    <input type="range" id="n1-ref-slider" min="0" max="105" step="0.1" value="96.0"
                        class="flex-slider">
                    <input type="text" class="input-value input-horizontal" id="n1-ref-val" value="96.0">
                </div>
                <div class="horizontal-setting">
                    <label class="setting-label">Temp:</label>
                    <input type="range" id="sel-temp-slider" min="0" max="70" step="1" value="42" class="flex-slider">
                    <div class="unit-toggle-widget unit-toggle-small" id="temp-unit-toggle"
                        onclick="toggleTemperatureUnit()">
                        <div class="unit-toggle-track">
                            <span class="unit-opt" id="temp-opt-c">C</span>
                            <span class="unit-opt" id="temp-opt-f">F</span>
                        </div>
                        <div class="unit-toggle-slider" id="temp-unit-slider"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="control-group borderless">
            <h3>Sistem Çarpanları</h3>
            <div class="vertical-layout">
                <div class="horizontal-setting">
                    <label class="multiplier-label">Yakıt Oranı:</label>
                    <input type="range" id="fuel-mult-slider" min="0.1" max="10" step="0.1" value="1.0"
                        class="flex-slider">
                    <input type="text" class="input-value input-horizontal" id="fuel-mult-val" value="1.0">
                </div>
                <div class="horizontal-setting">
                    <label class="multiplier-label">Inertia:</label>
                    <input type="range" id="inertia-mult-slider" min="0.1" max="5" step="0.1" value="1.0"
                        class="flex-slider">
                    <input type="text" class="input-value input-horizontal" id="inertia-mult-val" value="1.0">
                </div>
            </div>
        </div>
    </div>

    <div class="control-panel mode-panel">
        <div class="control-group">
            <h3>Uçuş Modları</h3>
            <div class="flight-modes-grid">
                <button onclick="setFlightMode('mode_r_to')">R-TO</button>
                <button onclick="setFlightMode('mode_r_crz')">R-CRZ</button>
                <button onclick="setFlightMode('mode_to')">TO</button>
                <button onclick="setFlightMode('mode_clb')">CLB</button>
                <button onclick="setFlightMode('mode_crz')">CRZ</button>
                <button onclick="setFlightMode('mode_ga')">G/A</button>
                <button onclick="setFlightMode('mode_con')">CON</button>
                <button onclick="setFlightMode('mode_---')">---</button>
                <button onclick="setFlightMode('mode_at_lim')">A/T LIM</button>
            </div>
            <button onclick="setFlightMode('NONE')" class="clear-mode-btn">TEMİZLE</button>
        </div>

        <div class="control-group borderless">
            <h3>Sistem Uyarıları</h3>
            <div class="vertical-layout-tight">
                <button onclick="toggleFailure('xb', 'ALL')">CROSSBLEED (XB)</button>
                <button onclick="toggleFailure('lo', 'ALL')">LOW QTY (LO)</button>
            </div>
        </div>

        <div class="control-group borderless">
            <h3>Birim Dönüşümü</h3>
            <div class="vertical-layout">
                <div class="horizontal-setting">
                    <label class="multiplier-label">Yakıt Birimi:</label>
                    <div class="unit-toggle-widget" id="fuel-unit-toggle" onclick="toggleFuelUnit()">
                        <div class="unit-toggle-track">
                            <span class="unit-opt" id="fuel-opt-lb">LB</span>
                            <span class="unit-opt" id="fuel-opt-kg">KG</span>
                        </div>
                        <div class="unit-toggle-slider" id="fuel-unit-slider"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="control-group borderless scenario-group" id="scenario-panel">
            <h3>Uçuş Senaryoları</h3>
            <div class="vertical-layout-tight">
                <button onclick="playScenario('normal_takeoff')">Normal Kalkış</button>
                <button onclick="playScenario('v1_cut')">Motor Arızası</button>
                <button onclick="clearScenario()" id="stop_scenario_btn" style="display:none;">DURDUR</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
